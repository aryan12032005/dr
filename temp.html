<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Handwriting Fonts in Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Handwriting Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Patrick+Hand&family=Indie+Flower&family=Kalam&family=Shadows+Into+Light&family=Sacramento&family=Reenie+Beanie&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
      @layer base {
        .font-dancing { font-family: 'Dancing Script', cursive; }
        .font-patrick { font-family: 'Patrick Hand', cursive; }
        .font-indie { font-family: 'Indie Flower', cursive; }
        .font-kalam { font-family: 'Kalam', cursive; }
        .font-shadows { font-family: 'Shadows Into Light', cursive; }
        .font-sacramento { font-family: 'Sacramento', cursive; }
        .font-reenie { font-family: 'Reenie Beanie', cursive; }
      }
    </style>
  </head>
  <body class="p-10 space-y-6 bg-white text-lg">

    <p class="font-dancing text-2xl">This is Dancing Script — flowing and elegant ✍️</p>
    <p class="font-patrick text-xl">Patrick Hand — like a neat teacher’s handwriting</p>
    <p class="font-indie text-xl">Indie Flower — informal and cheerful</p>
    <p class="font-kalam text-xl">Kalam — a realistic handwritten feel</p>
    <p class="font-shadows text-xl">Shadows Into Light — casual and friendly</p>
    <p class="font-sacramento text-2xl">Sacramento — signature-like, classy</p>
    <p class="font-reenie text-xl">Reenie Beanie — scribbly notebook style</p>

  </body>
</html>
